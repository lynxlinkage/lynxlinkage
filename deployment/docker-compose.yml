services:
  app:
    image: ghcr.io/lynxlinkage/lynxlinkage:latest
    container_name: lynxlinkage
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGIN: https://${DOMAIN}
      APP_NAME: LynxLinkage
      SITE_URL: https://${DOMAIN}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_URL: ${SMTP_URL}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CONTACT_STAFF_TO: ${CONTACT_STAFF_TO:-eddy@lynxlinkage.com}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - app-uploads:/app/data/uploads
    labels:
      - "traefik.enable=true"
      # Main router: public — landing page, public API, job listings
      - "traefik.http.routers.app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=myresolver"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
      # Admin router: Authelia-gated, group:hr only — admin UI + admin API + session exchange
      - "traefik.http.routers.app-admin.rule=Host(`${DOMAIN}`) && (PathPrefix(`/admin`) || PathPrefix(`/api/v1/admin`) || Path(`/api/v1/auth/session`))"
      - "traefik.http.routers.app-admin.entrypoints=websecure"
      - "traefik.http.routers.app-admin.tls.certresolver=myresolver"
      - "traefik.http.routers.app-admin.service=app"
      - "traefik.http.routers.app-admin.middlewares=authelia@docker"
    pull_policy: always
    networks:
      - web_proxy

volumes:
  app-uploads:

networks:
  web_proxy:
    external: true
