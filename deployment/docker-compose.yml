services:
  app:
    image: ghcr.io/lynxlinkage/lynxlinkage:latest
    container_name: lynxlinkage
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGIN: https://${DOMAIN}
      APP_NAME: LynxLinkage
      SITE_URL: https://${DOMAIN}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_URL: ${SMTP_URL}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CONTACT_STAFF_TO: ${CONTACT_STAFF_TO:-eddy@lynxlinkage.com}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - app-uploads:/app/data/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=myresolver"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
    pull_policy: always
    networks:
      - web_proxy

volumes:
  app-uploads:

networks:
  web_proxy:
    external: true
