# This project does NOT use Alembic. SQL migrations live under
# backend/internal/store/migrations/ and apply automatically when the API
# connects (see store.Open in cmd/server).
#
# This workflow sanity-checks that the embed build (same as Docker) succeeds
# so migrated schema code cannot ship broken.

name: Migrate database

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify-embed-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build server with embedded static (matches Docker image)
        working-directory: backend
        run: |
          mkdir -p internal/static/dist
          touch internal/static/dist/.gitkeep
          go build -tags=embed -o /dev/null ./cmd/server

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test ./... -count=1
