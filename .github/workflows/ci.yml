name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Build
        working-directory: backend
        run: go build ./...

      - name: Test
        working-directory: backend
        run: go test ./... -race -count=1

  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

      - name: Type check
        working-directory: frontend
        run: pnpm run check

      - name: Build
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:8080
        run: pnpm run build

  embedded-build:
    name: Embedded production binary
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build full binary
        run: make build

      - uses: actions/upload-artifact@v4
        with:
          name: lynxlinkage-linux-amd64
          path: bin/lynxlinkage
          if-no-files-found: error
