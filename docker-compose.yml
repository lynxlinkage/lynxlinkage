services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: lynxlinkage:dev
    ports:
      - "8080:8080"
    volumes:
      - app-data:/data
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      LOG_LEVEL: info
      DATABASE_URL: "file:/data/lynxlinkage.db?_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)"
      CORS_ALLOW_ORIGIN: "https://lynxlinkage.com"
      CONTACT_RPS: "0.2"
      CONTACT_BURST: "3"
    restart: unless-stopped

volumes:
  app-data:
